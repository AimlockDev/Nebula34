<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula34 - Gooning, Made Easy</title>
    <style>
        :root {
            --bg-black: #05070a;
            --main-bg: #0d1117;
            --accent-blue: #a3c4f3;
            --border-color: #21262d;
            --text-dim: #8b949e;
            --side-width: 75px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-black);
            color: #ffffff;
            margin: 0;
            display: grid;
            grid-template-columns: var(--side-width) 1fr;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Side Column --- */
        .side-col {
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 0;
            justify-content: space-between;
            background: var(--bg-black);
            z-index: 2001;
        }

        .planet {
            width: 45px;
            height: 45px;
            background: radial-gradient(circle at 30% 30%, #d9e7ff, #5da2f5);
            border: 4px solid #ffffff;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 20px rgba(163, 196, 243, 0.3);
        }
        .planet::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 65px; height: 14px;
            border: 5px solid var(--accent-blue);
            border-radius: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            box-sizing: border-box;
        }

        .settings-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 28px;
            cursor: pointer;
            transition: 0.3s;
        }
        .settings-btn:hover { color: var(--accent-blue); transform: rotate(45deg); }

        /* --- Settings Panel (FIXED CLOSING ISSUE) --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 3000;
            left: 85px;
            bottom: 25px;
            background: var(--main-bg);
            border: 2px solid var(--accent-blue);
            padding: 20px;
            border-radius: 15px;
            width: 260px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }

        /* --- Main Content --- */
        .main-col { overflow-y: auto; background: var(--main-bg); position: relative; }

        .r34-header {
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center; /* Vertical alignment */
            gap: 15px;
            position: sticky;
            top: 0;
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .search-wrapper { 
            flex: 1; 
            position: relative; 
            min-width: 0; /* Prevents flex items from overflowing */
        }

        input#tagInput {
            width: 100%;
            padding: 12px 18px;
            background: var(--bg-black);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box; /* Crucial for overlap fix */
        }

        button#searchBtn {
            background: var(--accent-blue);
            color: var(--bg-black);
            border: none;
            border-radius: 10px;
            font-weight: 800;
            padding: 12px 25px;
            cursor: pointer;
            white-space: nowrap; /* Prevents text wrapping inside button */
        }

        /* --- Ad Slots --- */
        .ad-zone {
            background: rgba(163, 196, 243, 0.03);
            border: 1px dashed var(--border-color);
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
        }
        .ad-top { width: 728px; height: 90px; }
        .ad-sidebar { width: 300px; height: 250px; grid-column: span 1; }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 30px;
        }

        .card { background: #161b22; border-radius: 15px; border: 1px solid var(--border-color); overflow: hidden; transition: 0.3s; }
        .media-wrap { width: 100%; height: 380px; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
        img, video { max-width: 100%; max-height: 100%; opacity: 0; transition: opacity 0.5s; }
        .loaded { opacity: 1; }
        .tags { padding: 12px; font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        #autocomplete-list {
            position: absolute;
            width: 100%;
            background: var(--main-bg);
            border: 1px solid var(--accent-blue);
            border-radius: 0 0 10px 10px;
            max-height: 250px;
            overflow-y: auto;
            display: none;
        }
    </style>
</head>
<body>

<div class="side-col">
    <div class="planet"></div>
    <div id="status" style="font-size: 10px; color: var(--accent-blue); font-weight: bold; text-align: center;">NEBULA<br>READY</div>
    <button class="settings-btn" id="openSettings">⚙</button>
</div>

<div class="main-col">
    <header class="r34-header">
        <div class="search-wrapper">
            <input type="text" id="tagInput" placeholder="Explore Nebula..." autocomplete="off">
            <div id="autocomplete-list"></div>
        </div>
        <button id="searchBtn">SEARCH</button>
    </header>

    <div class="ad-zone ad-top">Advertisement Space (728x90)</div>

    <div id="results" class="gallery"></div>
</div>

<div class="modal" id="settingsModal">
    <h3 style="margin-top:0; color:var(--accent-blue);">Nebula Options</h3>
    <div style="margin-bottom:15px; font-size:13px;">
        <label style="cursor:pointer;"><input type="checkbox" id="aiFilter"> Filter AI Generated</label>
    </div>
    <div style="margin-bottom:15px; font-size:13px;">
        <label>Blacklist Tags:</label>
        <input type="text" id="blacklistInput" placeholder="Separated by spaces" style="width:100%; background:#000; color:white; border:1px solid #444; border-radius:4px; padding:8px; margin-top:5px; box-sizing:border-box;">
    </div>
    <button id="saveBtn" style="width:100%; background:var(--accent-blue); border:none; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">APPLY</button>
</div>

<script>
    const uid = "6081594";
    const key = "a7b277d48f0b9564f03e283da3cb0b7bae5dd670f4e6529df10bfd18c1000ff9a3499f10f470dd1474fe9410f3b2b213d4b0416e923d0caa4587d4a8e7cb4c83";
    
    const tagInput = document.getElementById('tagInput');
    const autoList = document.getElementById('autocomplete-list');
    const results = document.getElementById('results');
    const status = document.getElementById('status');
    const modal = document.getElementById('settingsModal');

    // CONFIG & SETTINGS
    let config = JSON.parse(localStorage.getItem('nebulaConfig')) || { aiFilter: false, blacklist: "" };
    document.getElementById('aiFilter').checked = config.aiFilter;
    document.getElementById('blacklistInput').value = config.blacklist;

    // Open Settings (Prevent propagation so it doesn't instantly close)
    document.getElementById('openSettings').onclick = (e) => {
        e.stopPropagation();
        modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
    };

    // Close Settings if clicking outside, but NOT if clicking inside
    window.onclick = (e) => {
        if (!modal.contains(e.target) && e.target.id !== 'openSettings') {
            modal.style.display = 'none';
        }
        autoList.style.display = 'none';
    };

    // Prevent closing when clicking inside modal
    modal.onclick = (e) => e.stopPropagation();

    function saveSettings() {
        config.aiFilter = document.getElementById('aiFilter').checked;
        config.blacklist = document.getElementById('blacklistInput').value;
        localStorage.setItem('nebulaConfig', JSON.stringify(config));
        modal.style.display = 'none';
    }
    document.getElementById('saveBtn').onclick = saveSettings;

    // AUTOCOMPLETE
    tagInput.addEventListener('input', async () => {
        const words = tagInput.value.split(' ');
        const query = words[words.length - 1];
        if (query.length < 2) { autoList.style.display = 'none'; return; }
        try {
            const resp = await fetch(`https://api.rule34.xxx/autocomplete.php?q=${query}`);
            const data = await resp.json();
            autoList.innerHTML = '';
            autoList.style.display = 'block';
            data.forEach(s => {
                const div = document.createElement('div');
                div.className = 'suggestion';
                div.textContent = s.value;
                div.onclick = (e) => {
                    e.stopPropagation();
                    words[words.length - 1] = s.value;
                    tagInput.value = words.join(' ') + ' ';
                    autoList.style.display = 'none';
                    tagInput.focus();
                };
                autoList.appendChild(div);
            });
        } catch(e) {}
    });

    // LAZY LOAD
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const el = entry.target;
                el.src = el.dataset.src;
                el.onload = () => el.classList.add('loaded');
                if(el.tagName === 'VIDEO') el.onloadeddata = () => el.classList.add('loaded');
                observer.unobserve(el);
            }
        });
    }, { rootMargin: '400px' });

    async function doSearch() {
        let tags = tagInput.value.trim();
        if (!tags) return;
        if (config.aiFilter) tags += " -ai_generated";
        
        results.innerHTML = '';
        status.textContent = 'SYNCING...';

        const url = `https://api.rule34.xxx/index.php?page=dapi&s=post&q=index&json=1&limit=60&tags=${encodeURIComponent(tags)}&user_id=${uid}&api_key=${key}`;
        
        try {
            const resp = await fetch(url);
            const data = await resp.json();
            if (!data || data.length === 0) { status.textContent = 'NO DATA'; return; }

            const blacklist = config.blacklist.toLowerCase().split(' ').filter(t => t !== "");
            const filtered = data.filter(post => {
                const postTags = post.tags.toLowerCase();
                return !blacklist.some(badTag => postTags.includes(badTag));
            });

            status.textContent = `${filtered.length} RECS`;

            filtered.forEach((post, index) => {
                // Example: Inject a sidebar-style ad every 12 items
                if (index > 0 && index % 12 === 0) {
                    const ad = document.createElement('div');
                    ad.className = 'ad-zone ad-sidebar';
                    ad.textContent = 'Ad Space (300x250)';
                    results.appendChild(ad);
                }

                const card = document.createElement('div');
                card.className = 'card';
                const wrap = document.createElement('div');
                wrap.className = 'media-wrap';
                
                const isVideo = post.file_url.toLowerCase().match(/\.(mp4|webm)$/);
                const media = document.createElement(isVideo ? 'video' : 'img');
                media.dataset.src = post.file_url;
                
                if(isVideo) {
                    media.loop = true;
                    media.muted = true;
                    media.onclick = () => media.paused ? media.play() : media.pause();
                } else {
                    media.onclick = () => window.open(post.file_url);
                }
                
                observer.observe(media);
                wrap.appendChild(media);
                card.innerHTML = `<div class="tags">${post.tags}</div>`;
                card.prepend(wrap);
                results.appendChild(card);
            });
        } catch(e) { status.textContent = 'ERROR'; }
    }

    document.getElementById('searchBtn').onclick = doSearch;
    tagInput.onkeypress = (e) => { if(e.key === 'Enter') doSearch(); };
</script>

</body>
</html>
